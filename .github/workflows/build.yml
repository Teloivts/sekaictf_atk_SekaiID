name: Build exploit APK

on:
  workflow_dispatch:
    inputs:
      seed_b64:
        description: "optional binding_seed base64; can also configure at runtime via MainActivity"
        required: false
        default: ""
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug APK
        run: |
          gradle assembleDebug --no-daemon -PSEKAI_SEED_B64='${{ github.event.inputs.seed_b64 }}'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sekai-exploit-apk
          path: app/build/outputs/apk/debug/app-debug.apk
